name: Set up buf (proto codegen)
description: Install the buf CLI; optionally run buf generate.

inputs:
  generate:
    description: Run `buf generate` after installation.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: bufbuild/buf-setup-action@v1
      with:
        github_token: ${{ github.token }}

    - if: inputs.generate == 'true'
      shell: bash
      run: buf generate
