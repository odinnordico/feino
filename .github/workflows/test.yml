name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  go:
    name: Go tests (race)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go
      - name: go test (race + shuffle + coverage)
        # Filter out gitignore-style excluded paths (npm-vendored Go inside
        # node_modules). Mirrored in Makefile's $(GO_PKGS) — keep them in sync.
        run: |
          pkgs=$(go list ./... | grep -v -E '/node_modules/')
          go test -race -count=1 -shuffle=on \
            -coverprofile=coverage.out -covermode=atomic \
            $pkgs
      - name: Coverage summary
        if: always() && hashFiles('coverage.out') != ''
        run: |
          pct=$(go tool cover -func=coverage.out | tail -n1 | awk '{print $3}')
          {
            echo "### Go test coverage"
            echo ""
            echo "**Total:** $pct"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage profile
        if: always() && hashFiles('coverage.out') != ''
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 30

  web:
    name: Web tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: internal/web/ui
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: vitest
        id: vitest
        run: npm test -- --run --passWithNoTests
      - name: Test summary
        if: always()
        run: |
          {
            echo "### Web tests (vitest)"
            if [[ "${{ steps.vitest.outcome }}" == "success" ]]; then
              echo "✅ All tests passed."
            else
              echo "❌ Tests failed — see job log."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
