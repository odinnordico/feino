name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  go:
    name: CodeQL (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual
          queries: security-extended,security-and-quality

      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/setup-node

      - name: Build embedded frontend
        working-directory: internal/web/ui
        run: npm run build

      - name: Build Go (-tags=web)
        # Filter out gitignore-style excluded paths so CodeQL's manual build
        # mirrors what tests/lint/vuln scanners see.
        run: |
          pkgs=$(go list ./... | grep -v -E '/node_modules/')
          go build -tags=web $pkgs

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:go

  javascript:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
