name: Generate demo GIFs

on:
  push:
    branches: [main]
    paths:
      - 'demos/*.tape'
      - 'cmd/demoserver/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build feino and demoserver
        run: |
          go build -o feino ./cmd/feino
          go build -o demoserver ./cmd/demoserver

      - name: Generate GIFs with VHS
        uses: charmbracelet/vhs-action@v2
        with:
          path: 'demos/*.tape'

      - name: Commit generated GIFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate demo GIFs [skip ci]'
          file_pattern: 'demos/*.gif'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
