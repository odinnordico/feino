version: v2
plugins:
  # Go protobuf messages
  - remote: buf.build/protocolbuffers/go:v1.36.5
    out: gen
    opt: paths=source_relative

  # Connect-go handler interfaces
  - remote: buf.build/connectrpc/go:v1.19.1
    out: gen
    opt: paths=source_relative

  # TypeScript protobuf messages (for the React app)
  - remote: buf.build/bufbuild/es:v2.2.3
    out: internal/web/ui/src/gen
    opt: target=ts,import_extension=none

  # TypeScript Connect client
  - remote: buf.build/connectrpc/es:v1.6.1
    out: internal/web/ui/src/gen
    opt: target=ts,import_extension=none
